name: Rust CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Format, lint, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable \
            --profile minimal \
            --component rustfmt \
            --component clippy
          rustup default stable
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets --locked --verbose

      - name: Run tests
        run: cargo test --workspace --all-targets --locked --verbose

      - name: Smoke check Doria example
        run: cargo run -p doriac -- check examples/person.doria

      - name: Smoke compile Doria example to PHP
        run: cargo run -p doriac -- compile examples/person.doria --target php --out build/person.php
