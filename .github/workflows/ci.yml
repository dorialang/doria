name: ci

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  DORIA_RT_PATH: ${{ github.workspace }}/target/debug/libdoria_rt.a

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets --locked --verbose

      - name: Build doria-rt static library
        run: cargo build -p doria-rt --locked --verbose

      - name: Check host linker for native parity
        run: cc --version

      - name: Test
        run: cargo test --workspace --all-targets --locked --verbose

      - name: Run focused Stage 13 integer engine and semantic tests
        run: |
          cargo test -p doriac --test integer_engine_tests --locked --verbose
          cargo test -p doriac --test stage13_semantic_tests --locked --verbose

      - name: Run focused MIR and linker-independent Cranelift tests
        run: |
          cargo test -p doriac --test mir_tests --locked --verbose
          cargo test -p doriac --test cranelift_mir_tests --locked --verbose

      - name: Run complete durable interpreter and Cranelift parity matrix
        run: cargo test -p doriac --test native_mir_parity_tests --locked --verbose

      - name: Smoke signed and unsigned narrow-width native fixtures
        run: |
          cargo run -p doriac -- compile examples/native/main_integer_div_mod_42.doria --target native --out build/native/main_integer_div_mod_42
          cargo run -p doriac -- compile examples/native/main_fixed_width_arithmetic_42.doria --target native --out build/native/main_fixed_width_arithmetic_42
          set +e
          build/native/main_integer_div_mod_42
          signed_status=$?
          build/native/main_fixed_width_arithmetic_42
          unsigned_status=$?
          set -e
          test "${signed_status}" -eq 42
          test "${unsigned_status}" -eq 42

      - name: Check repository script guardrails
        run: |
          if find scripts -type f -name '*.py' -print -quit | grep -q .; then
            echo "Do not add Python scripts under scripts/; use Rust/PHP or update this guardrail with the explicit reason."
            find scripts -type f -name '*.py' -print
            exit 1
          fi

      - name: Check editor highlighting
        run: php scripts/check_editor_highlighting.php

      - name: Check documentation authority
        run: php scripts/check_docs_authority.php

      - name: Smoke check native Doria example
        run: cargo run -p doriac -- check examples/native/main_if_42.doria

      - name: Smoke dump native Doria example IR
        run: cargo run -p doriac -- hir examples/native/main_if_42.doria

      - name: Smoke compile native Doria example with default target
        run: cargo run -p doriac -- compile examples/native/main_if_42.doria --out build/native/main_if_42

      - name: Smoke run native Doria executable
        run: |
          set +e
          build/native/main_if_42
          status=$?
          set -e
          echo "native exit code: ${status}"
          test "${status}" -eq 42

      - name: Smoke check PHP compatibility example
        run: cargo run -p doriac -- check examples/php/person.doria

      - name: Smoke compile PHP compatibility example
        run: cargo run -p doriac -- compile examples/php/person.doria --target php --out build/php/person.php
