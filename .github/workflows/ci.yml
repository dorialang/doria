name: ci

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets --locked --verbose

      - name: Test
        run: cargo test --workspace --all-targets --locked --verbose

      - name: Smoke check Doria example
        run: cargo run -p doriac -- check examples/person.doria

      - name: Smoke dump Doria example IR
        run: cargo run -p doriac -- hir examples/person.doria

      - name: Smoke compile Doria example to PHP
        run: cargo run -p doriac -- compile examples/person.doria --target php --out build/person.php
